services:
    minio-server:
        image: chainguard/minio@sha256:cb84dfa704c648c4b14858aa288576bb1cf756a9b326112a0934db00e87d0bb8
        environment:
            - MINIO_ROOT_USER=${MINIO_ROOT_USER}
            - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
        ports:
            - '${MINIO_API_HOST_PORT:-6010}:9000'
            - '${MINIO_CONSOLE_HOST_PORT:-6011}:9001'
        volumes:
            - '${MINIO_MOUNT_PATH:-/mnt/miniodata}:/data'
        command: |
            server /data 
            --address ":9000" 
            --console-address ":9001"

    vector-db:
        image: milvus/milvus:latest
        environment:
            ETCD_USE_EMBED: "true"
            ETCD_DATA_DIR: "/var/lib/milvus/etcd"
            COMMON_STORAGETYPE: "local"
        ports:
            - '${VECTOR_DB_HOST_PORT:-19530}:19530'
            - '9091:9091'
        volumes:
            - milvus-data:/var/lib/milvus

    vdms-dataprep:
        build:
            context: ..
            dockerfile: docker/Dockerfile
            target: prod
        image: ${REGISTRY}vdms-dataprep:${TAG:-latest}
        environment:
            - http_proxy
            - https_proxy
            - no_proxy
            # Basic app settings
            - APP_HOST=vdms-dataprep

            # Milvus Vector Database settings
            - VECTOR_DB_HOST=${VECTOR_DB_HOST:-vector-db}
            - VECTOR_DB_PORT=19530

            # MinIO settings
            - MINIO_ENDPOINT=${MINIO_HOST}:9000
            - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
            - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
            - MINIO_SECURE=false
            - DEFAULT_BUCKET_NAME

            # Database settings
            - DB_COLLECTION=${INDEX_NAME}

            # Embedding service settings
            - MULTIMODAL_EMBEDDING_ENDPOINT
            - MULTIMODAL_EMBEDDING_MODEL_NAME=${EMBEDDING_MODEL_NAME:-}

            # Embedding processing mode settings (SDK vs API)
            - EMBEDDING_PROCESSING_MODE=${EMBEDDING_PROCESSING_MODE:-sdk}
            - SDK_USE_OPENVINO=${SDK_USE_OPENVINO:-false}
            - VDMS_DATAPREP_DEVICE=${VDMS_DATAPREP_DEVICE:-CPU}
            - EMBEDDING_BATCH_SIZE=${EMBEDDING_BATCH_SIZE:-32}
            - MAX_PARALLEL_WORKERS=${MAX_PARALLEL_WORKERS:-}

            # Frame processing settings
            - FRAME_INTERVAL=${FRAME_INTERVAL:-15}
            - ENABLE_OBJECT_DETECTION=${ENABLE_OBJECT_DETECTION:-true}
            - DETECTION_CONFIDENCE=${DETECTION_CONFIDENCE:-0.85}
            - FRAMES_TEMP_DIR=${FRAMES_TEMP_DIR:-/tmp/vdms_frames}

            # Object detection model directory
            - DETECTION_MODEL_DIR=${YOLOX_MODELS_MOUNT_PATH:-/app/models/yolox}

            # ROI consolidation settings
            - ROI_CONSOLIDATION_ENABLED=${ROI_CONSOLIDATION_ENABLED:-false}
            - ROI_CONSOLIDATION_IOU_THRESHOLD=${ROI_CONSOLIDATION_IOU_THRESHOLD:-0.2}
            - ROI_CONSOLIDATION_CLASS_AWARE=${ROI_CONSOLIDATION_CLASS_AWARE:-false}
            - ROI_CONSOLIDATION_CONTEXT_SCALE=${ROI_CONSOLIDATION_CONTEXT_SCALE:-0.2}

            # Application configuration
            - LOG_LEVEL=${VDMS_DATAPREP_LOG_LEVEL:-INFO}

            # CORS settings
            - ALLOW_ORIGINS=${ALLOW_ORIGINS:-*}
            - ALLOW_METHODS=${ALLOW_METHODS:-*}
            - ALLOW_HEADERS=${ALLOW_HEADERS:-*}
        ports:
            - '${VDMS_DATAPREP_HOST_PORT:-6007}:8000'
        volumes:
            - '${YOLOX_MODELS_VOLUME_NAME:-vdms-yolox-models}:${YOLOX_MODELS_MOUNT_PATH:-/app/models/yolox}'
            - data-prep:/tmp/dataprep
        depends_on:
            - minio-server

networks:
    default:
        driver: bridge

volumes:
    vdms-yolox-models:
        driver: local
    data-prep:
        driver: local
    milvus-data:
        driver: local
