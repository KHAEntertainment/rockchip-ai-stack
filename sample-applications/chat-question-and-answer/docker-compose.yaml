services:
  nginx:
    image: nginxinc/nginx-unprivileged:1.29.5
    build:
      context: .
      args:
        BUILDPLATFORM: linux/arm64
    ports:
      - "8101:8101"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - chatqna 
      - chatqna-ui
      - dataprep_pgvector 
    networks:
      - my_network
  chatqna:
    image: ${BE_IMAGE_NAME}
    build:
      context: .
      args:
        BUILDPLATFORM: linux/arm64
    ports:
      - "8100:8080"
    environment:
      - no_proxy=${no_proxy},llama-server,ollama,dataprep_pgvector
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
      - ENDPOINT_URL=${ENDPOINT_URL:-http://llama-server:8080/v1}
      - EMBEDDING_ENDPOINT_URL=${EMBEDDING_ENDPOINT_URL}
      - INDEX_NAME=${INDEX_NAME}
      - FETCH_K=${FETCH_K}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL_NAME}
      - LANCEDB_PATH=/data/lancedb
      - HUGGINGFACEHUB_API_TOKEN=${HUGGINGFACEHUB_API_TOKEN}
      - HF_TOKEN=${HUGGINGFACEHUB_API_TOKEN}
      - LLM_MODEL=${LLM_MODEL}
      - SEED=${SEED}
      - REQUESTS_CA_BUNDLE=${REQUESTS_CA_BUNDLE:-}
      - RERANKER_ENDPOINT=${RERANKER_ENDPOINT}
    networks:
      - my_network
    volumes:
      - "${CA_CERTIFICATES_PATH:-/opt/share/ca-certificates}:/opt/share/ca-certificates"
      - "${SSL_CERTIFICATES_PATH:-/etc/ssl/certs}:/etc/ssl/certs"

  dataprep_pgvector:
    image: ${REGISTRY:-}document-ingestion:latest
    container_name: dataprep_pgvector
    build:
      context: .
      args:
        BUILDPLATFORM: linux/arm64
    environment:
      no_proxy: ${no_proxy}
      https_proxy: ${https_proxy}
      LANCEDB_PATH: /data/lancedb
      INDEX_NAME: ${INDEX_NAME}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME}
      CHUNK_SIZE: ${CHUNK_SIZE}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP}
      BATCH_SIZE: ${BATCH_SIZE}
      HUGGINGFACEHUB_API_TOKEN: ${HUGGINGFACEHUB_API_TOKEN}
      HF_TOKEN: ${HUGGINGFACEHUB_API_TOKEN}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:?error}
    ports:
      - "8000:8000"
    volumes:
      - "${LANCEDB_DATA_PATH:-./data}:/data"
    networks:
      - my_network

  chatqna-ui:
    image: ${FE_IMAGE_NAME}
    container_name: chatqna-ui
    build:
      context: ./ui/react/
      args:
        BUILDPLATFORM: linux/arm64
    ports:
      - "5173:8101"
    networks:
      - my_network
    environment:
      - no_proxy=${no_proxy}
      - https_proxy=${https_proxy}
      - http_proxy=${http_proxy}
      - APP_ENDPOINT_URL=${APP_ENDPOINT_URL}
      - APP_DATA_PREP_URL=${APP_DATA_PREP_URL}
      - APP_MAX_TOKENS=${MAX_TOKENS}

  llama-server:
    image: ghcr.io/ggerganov/llama.cpp:server
    profiles:
      - LLAMA
    ports:
      - "8080:8080"
    volumes:
      - "${model_cache_path:-~/.cache/huggingface}:/models"
    environment:
      - no_proxy=${no_proxy}
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
    command: -m /models/${LLM_MODEL_FILE} --host 0.0.0.0 --port 8080
    networks:
      - my_network

  ollama:
    image: ollama/ollama:latest
    profiles:
      - OLLAMA
    ports:
      - "11434:11434"
    volumes:
      - "${model_cache_path:-~/.cache/ollama}:/root/.ollama"
    environment:
      - no_proxy=${no_proxy}
      - http_proxy=${http_proxy}
      - https_proxy=${https_proxy}
    networks:
      - my_network

networks:
  my_network:
    driver: bridge