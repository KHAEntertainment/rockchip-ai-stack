services:
  vss-ui:
    environment:
      APP_SOCKET_APPEND: ${CONFIG_SOCKET_APPEND:-CONFIG_OFF}
      APP_SUMMARY_FEATURE: ${SUMMARY_FEATURE:-FEATURE_ON}
      APP_SEARCH_FEATURE: ${SEARCH_FEATURE:-FEATURE_OFF}

  pipeline-manager:
    depends_on:
      vlm-serving:
        condition: service_healthy
      video-ingestion:
        condition: service_healthy
      rabbitmq-service:
        condition: service_healthy
      audio-analyzer:
        condition: service_healthy
    environment:
      EVAM_HOST: ${EVAM_HOST}
      EVAM_DEVICE: ${EVAM_DEVICE}
      EVAM_PIPELINE_PORT: 8080
      EVAM_PUBLISH_PORT: 1883
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_AMQP_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      LLM_SUMMARIZATION_KEY: ""
      LLM_SUMMARIZATION_API: ${LLM_SUMMARIZATION_API}
      LLM_SUMMARIZATION_DEVICE: ${LLM_DEVICE}
      VLM_CAPTIONING_KEY: ""
      VLM_CAPTIONING_API: ${VLM_ENDPOINT}
      VLM_CAPTIONING_DEVICE: ${VLM_DEVICE}
      LLM_CONCURRENT: ${PM_LLM_CONCURRENT}
      VLM_CONCURRENT: ${PM_VLM_CONCURRENT}
      SUMMARIZATION_MAX_COMPLETION_TOKENS: ${PM_SUMMARIZATION_MAX_COMPLETION_TOKENS}
      CAPTIONING_MAX_COMPLETION_TOKENS: ${PM_CAPTIONING_MAX_COMPLETION_TOKENS}
      MAX_CONTEXT_LENGTH: ${PM_LLM_MAX_CONTEXT_LENGTH}
      LLM_MODEL_API: ${LLM_MODEL_API}
      MULTI_FRAME_COUNT: ${PM_MULTI_FRAME_COUNT}
      AUDIO_HOST: ${AUDIO_ENDPOINT}
      AUDIO_DEVICE: CPU
      SEARCH_ENDPOINT: ""
      SEARCH_DATAPREP_ENDPOINT: ""
      SUMMARY_FEATURE: ${SUMMARY_FEATURE:-FEATURE_ON}
      SEARCH_FEATURE: ${SEARCH_FEATURE:-FEATURE_OFF}
      WORKERS: ${WORKERS:-1}

  vlm-serving:
    image: ghcr.io/ggerganov/llama.cpp:server
    ipc: host
    ports:
      - "${VLM_HOST_PORT:-8080}:8080"
    volumes:
      - "${VLM_MODEL_PATH:-./models}:/models"
    environment:
      no_proxy: ${no_proxy},${MINIO_HOST},localhost
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
    command: -m /models/${VLM_MODEL_FILE} --host 0.0.0.0 --port 8080 --ctx-size 4096
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 60s
    networks:
      - vs_network

  video-ingestion:
    image: ${REGISTRY:-}video-ingestion:${TAG:-latest}
    read_only: true
    security_opt:
      - no-new-privileges
    privileged: false
    tty: true
    ports:
      - "${EVAM_PIPELINE_HOST_PORT:-8080}:8080"
    # NOT_SUPPORTED_ON_ARM64: Video ingestion via DLStreamer is not supported on RK3588.
    # Pre-ingested video clips can be provided directly to the pipeline manager.
    profiles:
      - x86-only
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/pipelines", "-o", "/dev/null"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      no_proxy: ${no_proxy},${MINIO_HOST},${RABBITMQ_HOST},localhost
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      RABBITMQ_HOST: ${RABBITMQ_HOST}
      RABBITMQ_PORT: 1883
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      MINIO_SERVER: ${MINIO_HOST}:80
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      RUN_MODE: EVA
      DETECTION_DEVICE: ${EVAM_DEVICE}
      ADD_UTCTIME_TO_METADATA: true
      LSFEATURE_NAME: "EVAM"
      HTTPS: false
      MTLS_VERIFICATION: false
      APPEND_PIPELINE_NAME_TO_PUBLISHER_TOPIC: false
      REST_SERVER_PORT: 8080
    entrypoint: ["./run.sh"]
    volumes:
      - "/run/udev:/run/udev:ro"
      - "/dev:/dev"
      - "/tmp:/tmp"
      - "vol_evam_pipeline_root:/var/cache/pipeline_root:uid=1999,gid=1999"
      - "${OV_MODEL_DIR}:/home/pipeline-server/models"
    group_add:
      - "109"
      - "110"
    device_cgroup_rules:
      - "c 189:* rmw"
      - "c 209:* rmw"
      - "a 189:* rwm"
    devices:
      - "/dev:/dev"
    networks:
      - vs_network

  audio-analyzer:
    image: ${REGISTRY:-}audio-analyzer:${TAG:-latest}
    hostname: audio-analyzer
    ports:
      - "${AUDIO_HOST_PORT:-8000}:8000"
    volumes:
      - audio_analyzer_data:/data
    environment:
      - http_proxy
      - https_proxy
      - no_proxy=$no_proxy,${MINIO_HOST},localhost
      - DEBUG=false
      - ENABLED_WHISPER_MODELS=${AUDIO_ENABLED_MODELS}
      - MAX_FILE_SIZE=${AUDIO_MAX_FILE}
      - USE_FP16=${USE_FP16:-false}
      - MINIO_ENDPOINT=${MINIO_HOST}:80
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
    depends_on:
      minio-service:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 10s
    networks:
      - vs_network

  rabbitmq-service:
    image: rabbitmq:3-management-alpine
    ports:
      - "${RABBITMQ_AMQP_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_UI_HOST_PORT:-15672}:15672"
      - "${RABBITMQ_MQTT_HOST_PORT:-1883}:1883"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    environment:
      no_proxy: ${no_proxy},localhost
      http_proxy: $http_proxy
      https_proxy: $https_proxy
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    command: >
      sh -c "rabbitmq-plugins enable --offline rabbitmq_mqtt rabbitmq_web_mqtt && rabbitmq-server"
    volumes:
      - ${RABBITMQ_CONFIG}:/etc/rabbitmq/rabbitmq.conf
    networks:
      - vs_network

volumes:
  audio_analyzer_data:
    driver: local
  vol_evam_pipeline_root:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
