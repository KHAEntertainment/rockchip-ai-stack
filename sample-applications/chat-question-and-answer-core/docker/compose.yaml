x-nginx-common: &nginx-common
  image: nginxinc/nginx-unprivileged:1.29.5
  container_name: chatqna-core-nginx
  ports:
    - "8102:8102"
  volumes:
    - ../nginx_config/nginx.conf:/etc/nginx/nginx.conf:ro

x-chatqna-core-common: &chatqna-core-common
  image: ${REGISTRY:-}chatqna:${BACKEND_TAG:-latest}
  build:
    context: ../
    dockerfile: docker/Dockerfile
    args:
      BUILDPLATFORM: linux/arm64
  environment:
    http_proxy: ${http_proxy}
    https_proxy: ${https_proxy}
    no_proxy: ${no_proxy}
    HF_ACCESS_TOKEN: ${HF_ACCESS_TOKEN}
  ports:
    - "8888:8888"
  volumes:
    - "${MODEL_CACHE_PATH}:/tmp/model_cache"
    - "${MODEL_CONFIG_PATH:-/dev/null}:/tmp/model_config/config.yaml"
  group_add:
    - ${USER_GROUP_ID-1000}

services:
  # ARM64-compatible OLLAMA profile (the only supported backend for RK3588)
  nginx-ollama:
    <<: *nginx-common
    profiles:
      - OLLAMA
    depends_on:
      - chatqna-core-ollama
      - chatqna-core-ui

  chatqna-core-ollama:
    <<: *chatqna-core-common
    profiles:
      - OLLAMA
    container_name: chatqna-core-ollama
    build:
      context: ../
      dockerfile: docker/Dockerfile.ollama
      args:
        BUILDPLATFORM: linux/arm64
    environment:
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy},127.0.0.1

  chatqna-core-ui:
    image: ${REGISTRY:-}chatqna-ui:${UI_TAG:-latest}
    container_name: chatqna-core-ui
    build:
      context: ../ui/
      dockerfile: Dockerfile
      args:
        BUILDPLATFORM: linux/arm64
    environment:
      http_proxy: ${http_proxy}
      https_proxy: ${https_proxy}
      no_proxy: ${no_proxy}
      APP_BACKEND_URL: ${APP_BACKEND_URL}
    ports:
      - "5173:8102"

networks:
  default:
    driver: bridge